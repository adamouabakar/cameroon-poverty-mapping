<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Animation temporelle — Cameroun</title>
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css"/>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    #banner { background: #1a1a1a; color: #f5f5f5; padding: 0.5rem 1rem; font-size: 0.85rem; }
    #controls { padding: 0.75rem 1rem; background: #fafafa; border-bottom: 1px solid #ddd; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    #map { height: calc(100vh - 120px); min-height: 400px; }
    #year-slider { flex: 1; min-width: 200px; }
    #year-label { font-weight: 600; min-width: 4rem; }
    a { color: #06c; }
  </style>
</head>
<body>
  <div id="banner" role="note">
    Animation exploratoire 2014–2022 (tendances INS ECAM4/5) — pas de stats officielles ·
    <a href="index.html">carte stable</a> · <a href="beta.html">beta</a>
  </div>
  <div id="controls">
    <span id="year-label">2018</span>
    <input id="year-slider" type="range" min="0" max="2" value="1" step="1" aria-label="Année"/>
    <button id="play-btn" type="button">▶ Lecture</button>
    <span id="status" style="font-size:0.85rem;color:#555"></span>
  </div>
  <div id="map" role="application" aria-label="Carte animation temporelle"></div>
  <script src="vendor/leaflet/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([5.5, 12.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let panel = null;
    let years = [2014, 2018, 2022];
    let layerGroup = L.layerGroup().addTo(map);
    let playTimer = null;

    function wealthColor(w, minW, maxW) {
      const t = (w - minW) / (maxW - minW || 1);
      const r = Math.round(220 * (1 - t) + 40 * t);
      const g = Math.round(60 * (1 - t) + 180 * t);
      const b = Math.round(60 * (1 - t) + 80 * t);
      return `rgb(${r},${g},${b})`;
    }

    function renderYear(idx) {
      if (!panel) return;
      const year = years[idx];
      document.getElementById('year-label').textContent = year;
      document.getElementById('year-slider').value = idx;
      const pts = panel.clusters_by_year[String(year)] || [];
      layerGroup.clearLayers();
      const ws = pts.map(p => p.w);
      const minW = Math.min(...ws), maxW = Math.max(...ws);
      pts.forEach(p => {
        L.circleMarker([p.lat, p.lon], {
          radius: 5,
          fillColor: wealthColor(p.w, minW, maxW),
          color: '#333',
          weight: 0.5,
          fillOpacity: 0.85
        }).bindPopup(`<b>${p.r}</b><br>Cluster ${p.id}<br>Wealth: ${p.w}<br>${year}`);
      });
      document.getElementById('status').textContent = `${pts.length} grappes · ${year}`;
    }

    fetch('assets/temporal_panel.json')
      .then(r => r.json())
      .then(data => {
        panel = data;
        years = data.years || years;
        const slider = document.getElementById('year-slider');
        slider.max = years.length - 1;
        renderYear(1);
        slider.addEventListener('input', e => renderYear(+e.target.value));
        document.getElementById('play-btn').addEventListener('click', () => {
          if (playTimer) { clearInterval(playTimer); playTimer = null; document.getElementById('play-btn').textContent = '▶ Lecture'; return; }
          let i = 0;
          document.getElementById('play-btn').textContent = '⏸ Pause';
          playTimer = setInterval(() => { renderYear(i); i = (i + 1) % years.length; }, 1500);
        });
      })
      .catch(err => {
        document.getElementById('status').textContent = 'Données temporelles non chargées — exécuter Jalon 6';
        console.error(err);
      });
  </script>
</body>
</html>
