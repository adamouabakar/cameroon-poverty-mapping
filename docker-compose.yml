services:
  streamlit:
    build: .
    image: cameroon-poverty-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./configs:/app/configs:ro
      - ./assets:/app/assets:ro
      - ./data:/app/data:ro
      - ./partner_pack:/app/partner_pack:ro
      - ./outputs:/app/outputs:ro
      - ./site:/app/site:ro
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped